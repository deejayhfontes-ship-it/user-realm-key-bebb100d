<!DOCTYPE html>
<html>
<head><title>Measure Red Box</title></head>
<body>
    <img id="img" src="/src/pages/prefeitura/assets/decreto_edital/modeloEDUCACAODECRETO01.png" style="display:none;" />
    <canvas id="canvas"></canvas>
    <div id="output"></div>

    <script>
        window.onload = function() {
            var img = document.getElementById('img');
            var canvas = document.getElementById('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);

            var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            var data = imgData.data;

            var minX = canvas.width, maxX = 0, minY = canvas.height, maxY = 0;

            for (var y = 0; y < canvas.height; y++) {
                for (var x = 0; x < canvas.width; x++) {
                    var idx = (y * canvas.width + x) * 4;
                    var r = data[idx];
                    var g = data[idx+1];
                    var b = data[idx+2];

                    if (r > 200 && g < 50 && b < 50) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                }
            }

            var output = `Width: ${canvas.width}, Height: ${canvas.height} | Box: left ${minX}, right ${canvas.width - maxX}, top ${minY}, bottom ${canvas.height - maxY}`;
            document.getElementById('output').innerText = output;
        };
    </script>
</body>
</html>
